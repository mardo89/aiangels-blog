name: Mastodon Scheduler

on:
  schedule:
    # 3x/day — safe organic pace (no spam)
    - cron: '7 13 * * *'    # 9 AM EST
    - cron: '37 19 * * *'   # 3:37 PM EST
    - cron: '7 1 * * *'     # 9 PM EST
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to post (YYYY-MM-DD) or "all"'
        required: false
        default: ''

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Create .env
        run: |
          echo "MASTODON_ACCESS_TOKEN=${{ secrets.MASTODON_ACCESS_TOKEN }}" > .env

      - name: Run Mastodon scheduler
        run: |
          DATE="${{ github.event.inputs.date || '' }}"
          if [ "$DATE" = "all" ]; then
            python3 mastodon_scheduler.py --all
          elif [ -n "$DATE" ]; then
            python3 mastodon_scheduler.py --date "$DATE"
          else
            python3 mastodon_scheduler.py
          fi

      - name: Save post log
        if: always()
        run: |
          git config user.email "info@aiangels.io"
          git config user.name "AI Angels Bot"
          git add mastodon_post_log.json mastodon_schedule.json
          git diff --cached --quiet || git commit -m "Update Mastodon post log [skip ci]"
          git push || true
